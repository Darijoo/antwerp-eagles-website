<div class="teams-container">
  <h2 class="sectie-titel">Onze Teams</h2>

  <div class="teams-grid">
    @for (team of alleTeams; track team.id) {
      <article class="team-kaart">
        @if (team.afbeeldingUrl) {
          <div class="kaart-afbeelding">
            <img [src]="team.afbeeldingUrl" [alt]="team.naam" />
          </div>
        }

        <div class="team-inhoud">
          <h3>{{ team.naam }}</h3>
          <p class="team-categorie"><strong>Categorie:</strong> {{ team.categorie }}</p>
          <p class="team-omschrijving">{{ team.omschrijving }}</p>

          <!-- Let op: we gebruiken nu team.id in plaats van team.documentId -->
          <a [routerLink]="['/teams', team.id]" class="btn-detail">Bekijk Team &rarr;</a>
        </div>
      </article>
    } @empty {
      <p>Geen teams gevonden. Voeg er een toe via het beheerpaneel!</p>
    }
  </div>
</div>
