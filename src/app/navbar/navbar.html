<nav class="navbar" [class.navbar-hidden]="isHidden">
  <a routerLink="/" class="logo">
    <img src="/eagles_logo_transparant.png" alt="Antwerp Eagles Logo" class="logo-img" />
    Antwerp Eagles
  </a>

  <!-- De hamburger knop voor mobiel -->
  <button class="hamburger" (click)="toggleMenu()" [class.actief]="menuOpen">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <ul class="nav-links" [class.actief]="menuOpen">
    <li><a routerLink="/" routerLinkActive="actief-link" [routerLinkActiveOptions]="{exact: true}" (click)="sluitMenu()">Homeplate</a></li>
    
    <li class="dropdown" [class.open]="activeDropdown === 'playBall'">
      <a href="#" (click)="toggleDropdown('playBall', $event)">Play Ball <i class="fa-solid fa-chevron-down"></i></a>
      <ul class="dropdown-menu">
        <li><a routerLink="/aansluiten" routerLinkActive="actief-link" (click)="sluitMenu()">Lid Worden</a></li>
        <li><a routerLink="/teams" routerLinkActive="actief-link" (click)="sluitMenu()">Teams</a></li>
        <li><a routerLink="/uniform" routerLinkActive="actief-link" (click)="sluitMenu()">Uniform & Uitrusting</a></li>
      </ul>
    </li>

    <li class="dropdown" [class.open]="activeDropdown === 'season'">
      <a href="#" (click)="toggleDropdown('season', $event)">Season Overview <i class="fa-solid fa-chevron-down"></i></a>
      <ul class="dropdown-menu">
        <li><a routerLink="/kalender" routerLinkActive="actief-link" (click)="sluitMenu()">Calender</a></li>
        <li><a routerLink="/klassementen" routerLinkActive="actief-link" (click)="sluitMenu()">Rankings & Results</a></li>
        <li>
          <a href="https://www.baseballsoftball.be/" target="_blank" rel="noopener noreferrer" (click)="sluitMenu()">
            Statistics <i class="fa-solid fa-arrow-up-right-from-square" style="opacity: 0.7; margin-left: auto;"></i>
          </a>
        </li>
        <li><a routerLink="/toernooien" routerLinkActive="actief-link" (click)="sluitMenu()">Eagle Tournaments</a></li>
        <li><a routerLink="/evenementen" routerLinkActive="actief-link" (click)="sluitMenu()">Eagle Events</a></li>
      </ul>
    </li>

    <li class="dropdown" [class.open]="activeDropdown === 'overOns'">
      <a href="#" (click)="toggleDropdown('overOns', $event)">Over Ons <i class="fa-solid fa-chevron-down"></i></a>
      <ul class="dropdown-menu">
        <li><a routerLink="/contact" routerLinkActive="actief-link" (click)="sluitMenu()">Contact</a></li>
        <li><a routerLink="/nieuws" routerLinkActive="actief-link" (click)="sluitMenu()">News articles</a></li>
        <li><a routerLink="/historiek" routerLinkActive="actief-link" (click)="sluitMenu()">History</a></li>
        <li>
          <a href="https://www.facebook.com/antwerpeagles/" target="_blank" rel="noopener noreferrer" (click)="sluitMenu()">
            Social Media <i class="fa-solid fa-arrow-up-right-from-square" style="opacity: 0.7; margin-left: auto;"></i>
          </a>
        </li>
      </ul>
    </li>
  </ul>
</nav>
