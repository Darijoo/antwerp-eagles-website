<div class="login-container">
  <div class="login-box">
    <h2>Beheerder Inloggen</h2>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">E-mailadres</label>
        <input type="email" id="email" name="email" [(ngModel)]="email" required autocomplete="username" />
      </div>

      <div class="form-group">
        <label for="password">Wachtwoord</label>
        <div class="password-wrapper">
          <input 
            [type]="toonWachtwoord ? 'text' : 'password'" 
            id="password" 
            name="password" 
            [(ngModel)]="password" 
            required 
            autocomplete="current-password" 
          />
          <button type="button" class="toggle-password-btn" (click)="toggleWachtwoord()">
            <i class="fa-solid" [class.fa-eye]="!toonWachtwoord" [class.fa-eye-slash]="toonWachtwoord"></i>
          </button>
        </div>
      </div>

      <button type="submit">Inloggen</button>
    </form>

    @if (errorMessage) {
      <p class="error-message">{{ errorMessage }}</p>
    }
  </div>
</div>
