<div class="artikel-container">
  <a routerLink="/" class="terug-knop">&larr; Terug naar overzicht</a>

  @if (actueelBericht) {
    <article class="volledig-artikel">
      <div class="datum-badge">{{ actueelBericht.datum | date: 'dd-MM-yyyy' }}</div>
      <h2>{{ actueelBericht.titel }}</h2>

      @if (actueelBericht.afbeeldingUrl) {
        <div class="artikel-afbeelding-container">
          <img
            [src]="actueelBericht.afbeeldingUrl"
            [alt]="actueelBericht.titel"
            class="hoofdfoto"
          />
        </div>
      }

      <div class="artikel-tekst">
        <p>{{ actueelBericht.volledigeText }}</p>
      </div>
    </article>
  } @else {}
</div>
