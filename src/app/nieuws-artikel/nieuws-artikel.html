@if (actueelBericht) {
  <div class="nieuws-detail-sectie">
    <div class="container">
      <a routerLink="/" class="terug-knop">&larr; Terug naar overzicht</a>

      <article class="nieuws-detail-kaart">
        @if (actueelBericht.afbeeldingUrl) {
          <div class="nieuws-hero">
            <img [src]="actueelBericht.afbeeldingUrl" [alt]="actueelBericht.titel" />
          </div>
        }

        <div class="nieuws-inhoud">
          <div class="nieuws-header">
            <h2>{{ actueelBericht.titel }}</h2>
            <span class="datum-badge">{{ actueelBericht.datum | date: 'dd-MM-yyyy' }}</span>
          </div>

          <div class="artikel-tekst">
            <p class="behoud-enters">{{ actueelBericht.volledigeText }}</p>
          </div>
        </div>
      </article>
    </div>
  </div>
} @else {
  <div class="laden-sectie">
    <div class="spinner">⚾</div>
    <p>Nieuwsbericht laden...</p>
  </div>
}
