<div class="artikel-container">
  <a routerLink="/" class="terug-knop">&larr; Terug naar overzicht</a>

  @if (actueelBericht) {
    <article class="volledig-artikel">
      <div class="datum-badge">{{ actueelBericht.datum }}</div>
      <h2>{{ actueelBericht.titel }}</h2>

      <div class="artikel-tekst">
        <p>{{ actueelBericht.volledigeTekst }}</p>
      </div>
    </article>
  } @else {
    <div class="foutmelding">
      <h2>Oeps!</h2>
      <p>Dit nieuwsbericht bestaat helaas niet (meer).</p>
    </div>
  }
</div>
