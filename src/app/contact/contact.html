<div class="contact-container">
  <h2>Neem Contact Op</h2>

  <div class="contact-grid">
    <div class="contact-info">
      <h3>Onze Locatie</h3>
      <p><strong>Sportschuur Fort VIII</strong><br />Hoofdfrontweg<br />2660 Hoboken, Antwerpen</p>
      <p>
        <strong>E-mail:</strong>
        <a href="mailto:sportsecretariaat@antwerpeagles.com">sportsecretariaat@antwerpeagles.com</a>
      </p>

      <div class="map-container">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2501.996162137912!2d4.348618076632426!3d51.16362507174312!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47c3f156d9531bfd%3A0xc31a719c8119eb45!2sSportschuur%20Fort%208!5e0!3m2!1sen!2sbe!4v1700000000000!5m2!1sen!2sbe"
          width="100%"
          height="250"
          style="border: 0; border-radius: 8px"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        >
        </iframe>
      </div>
    </div>

    <div class="contact-form">
      <h3>Stuur een bericht</h3>
      <form>
        <div class="form-group">
          <label for="naam">Naam</label>
          <input type="text" id="naam" placeholder="Jouw naam" />
        </div>

        <div class="form-group">
          <label for="email">E-mailadres</label>
          <input type="email" id="email" placeholder="jouw@email.com" />
        </div>

        <div class="form-group">
          <label for="bericht">Bericht</label>
          <textarea
            id="bericht"
            rows="5"
            placeholder="Typ hier je vraag of opmerking..."
          ></textarea>
        </div>

        <button type="button" class="submit-knop">Verstuur Bericht</button>
      </form>
    </div>
  </div>
</div>
