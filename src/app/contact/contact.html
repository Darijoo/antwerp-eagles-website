<div class="contact-container">
  <h2>Neem Contact Op</h2>

  <div class="contact-grid">
    <div class="contact-info">
      <h3>Onze Locatie</h3>
      <p><strong>Antwerp Eagles</strong><br />Eglantierlaan<br />2610 Wilrijk</p>
      <p>
        <strong>E-mail:</strong>
        <a href="mailto:sportsecretariaat@antwerpeagles.com">sportsecretariaat@antwerpeagles.com</a>
      </p>

      <div class="map-container">
        <iframe
          src="https://maps.google.com/maps?q=Eglantierlaan,+Wilrijk&hl=nl&z=15&output=embed"
          width="100%"
          height="250"
          style="border: 0; border-radius: 8px"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        >
        </iframe>
      </div>
    </div>

    <div class="contact-form">
      <h3>Stuur een bericht</h3>
      <form>
        <div class="form-group">
          <label for="naam">Naam</label>
          <input type="text" id="naam" placeholder="Jouw naam" />
        </div>

        <div class="form-group">
          <label for="email">E-mailadres</label>
          <input type="email" id="email" placeholder="jouw@email.com" />
        </div>

        <div class="form-group">
          <label for="bericht">Bericht</label>
          <textarea
            id="bericht"
            rows="5"
            placeholder="Typ hier je vraag of opmerking..."
          ></textarea>
        </div>

        <button type="button" class="submit-knop">Verstuur Bericht</button>
      </form>
    </div>
  </div>
</div>
