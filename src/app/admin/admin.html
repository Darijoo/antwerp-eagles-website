<style>
  @media (max-width: 768px) {
    .admin-dashboard {
      display: flex;
      flex-direction: column;
      max-width: 100%;
      overflow-x: hidden;
    }
    .admin-sidebar {
      width: 100%;
      min-height: auto;
      padding: 1rem;
      border-right: none;
      border-bottom: 2px solid #eee;
      box-sizing: border-box;
    }
    .admin-sidebar nav ul {
      display: flex;
      overflow-x: auto;
      gap: 1rem;
      padding-bottom: 0.5rem;
      margin-bottom: 0;
      list-style: none;
      padding-left: 0;
    }
    .admin-sidebar nav ul li {
      margin-bottom: 0;
      white-space: nowrap;
    }
    .admin-content {
      padding: 1rem;
      box-sizing: border-box;
      max-width: 100%;
    }
    .admin-header h1 {
      font-size: 1.5rem;
    }
  }
</style>
<div class="admin-dashboard">
  <aside class="admin-sidebar">
    <h3>Beheer</h3>
    <nav>
      <ul>
        <li><a routerLink="/admin/nieuws" routerLinkActive="active">Nieuwsberichten</a></li>
        <li><a routerLink="/admin/teams" routerLinkActive="active">Teams</a></li>
        <li><a routerLink="/admin/uniform" routerLinkActive="active">Uniform Gids</a></li>
        <li><a routerLink="/admin/sponsors" routerLinkActive="active">Sponsors</a></li>
        <li><a routerLink="/admin/kalender" routerLinkActive="active">Kalender</a></li>
      </ul>
    </nav>
    <button class="logout-button" (click)="logout()">Uitloggen</button>
  </aside>

  <main class="admin-content">
    <header class="admin-header">
      <h1>Welkom, Beheerder!</h1>
      <p>Selecteer een optie in het menu om de website te beheren.</p>
    </header>

    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
