<div class="admin-dashboard">
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      <img src="/eagles_logo_transparant.png" alt="Logo" class="sidebar-logo">
      <div class="brand-text">
        <span class="club-naam">Antwerp Eagles</span>
        <span class="admin-label">Admin Nest</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-category">Content Beheer</div>
      <ul>
        <li>
          <a routerLink="/admin/nieuws" routerLinkActive="active">
            <i class="fa-solid fa-newspaper"></i>
            <span>Nieuws Artikels</span>
          </a>
        </li>
        <li>
          <a routerLink="/admin/kalender" routerLinkActive="active">
            <i class="fa-solid fa-calendar-days"></i>
            <span>Kalender</span>
          </a>
        </li>
      </ul>

      <div class="nav-category">Club Beheer</div>
      <ul>
        <li>
          <a routerLink="/admin/teams" routerLinkActive="active">
            <i class="fa-solid fa-users-gear"></i>
            <span>Teams & Spelers</span>
          </a>
        </li>
        <li>
          <a routerLink="/admin/uniform" routerLinkActive="active">
            <i class="fa-solid fa-shirt"></i>
            <span>Uniform Gids</span>
          </a>
        </li>
        <li>
          <a routerLink="/admin/sponsors" routerLinkActive="active">
            <i class="fa-solid fa-handshake-angle"></i>
            <span>Sponsors</span>
          </a>
        </li>
      </ul>

      <div class="nav-category">Systeem</div>
      <ul>
        <li>
          <button class="logout-button-alt" (click)="logout()">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>Uitloggen</span>
          </button>
        </li>
      </ul>
    </nav>
  </aside>

  <main class="admin-content">
    <header class="admin-header">
      <h1>Dashboard</h1>
      <p>Welkom terug! Beheer hier alle content van de Antwerp Eagles website.</p>
    </header>

    <div class="content-area reveal-animatie">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
